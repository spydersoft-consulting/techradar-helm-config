resources:
  repositories:
    - repository: ops_nonprod_cluster
      type: github
      endpoint: spydersoft-gh
      name: spydersoft-consulting/ops-nonprod-cluster
    - repository: ops_prod_cluster
      type: github
      endpoint: spydersoft-gh
      name: spydersoft-consulting/ops-prod-cluster
    - repository: templates
      type: github
      endpoint: spydersoft-gh
      name: spydersoft-consulting/azure-devops-templates

# Every build (beta or release) writes only to environments/test/images.yaml
# -- see scripts/process-cicd.ps1. The stage/production promotions this
# pipeline performs push their own commits (with [skip ci], same
# convention the old production-promotion step already used) rather than
# relying on a separate trigger, so this is the only path this pipeline
# needs to watch.
trigger:
  batch: true
  branches:
    include:
    - main
  paths:
    include:
    - environments/test/*
    exclude:
    - README.md
    - scripts/*

pr: none

extends:
  template: deploy.yml
  parameters:
    vmImage: ubuntu-latest
