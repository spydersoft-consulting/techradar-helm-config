resources:
  repositories:
    - repository: ops_nonprod_cluster
      type: github
      endpoint: spydersoft-gh
      name: spydersoft-consulting/ops-nonprod-cluster
    - repository: templates
      type: github
      endpoint: spydersoft-gh
      name: spydersoft-consulting/azure-devops-templates

# Test only, triggered purely by environments/test/* changing on main --
# see pipeline-main.yml for why this replaced a persistent beta branch.
trigger:
  batch: true
  branches:
    include:
    - main
  paths:
    include:
    - environments/test/*
    exclude:
    - README.md
    - scripts/*

pr: none

extends:
  template: test.yml
