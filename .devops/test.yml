stages:
- template: stages/stages-generate-commit-manifests/v1.yml@templates
  parameters:
    environmentName: "test"
    helmfileDirectory: ./
    argoRepoName: ops_nonprod_cluster
    argoBaseDir: apps/reference-architecture
    helmfileVersion: "1.2.3"
    pregenerateSteps:
      # techradar-app's release now pulls its chart from an OCI registry
      # (ghcr.io) -- helmfile needs to be authenticated for that pull,
      # which nothing here previously required (only public Helm repos
      # and local charts, before this).
      - task: Docker@2
        displayName: Login to Container Registry (for OCI chart pulls)
        inputs:
          command: login
          containerRegistry: github-spydersoft-docker

# process-cicd.ps1 now writes every build (both main's beta builds and tag
# releases) to environments/test/images.yaml -- there's no other trigger
# path for a release version to ever reach stage. So promotion happens
# here, gated on whether test's chart_version looks like a real release
# (a clean X.Y.Z, no "-beta.N" or other prerelease label) rather than on
# which branch produced it -- matching GitVersion.yml's tags: config,
# which always produces an unlabeled version. Runs only after test's own
# deploy (manifest generation + commit) has actually succeeded.
- stage: promote_test_to_stage
  displayName: Promote Test to Stage (release builds only)
  dependsOn: generate_commit_manifest_test
  jobs:
    - job: promote
      pool:
        name: Default
      steps:
        - checkout: self
          clean: true
          persistCredentials: true
        - script: |
            git config --global user.email "gerega@gmail.com"
            git config --global user.name "CI/CD User"
            cd $(Build.SourcesDirectory)
            git checkout main
            git pull --rebase

            if grep -qE "chart_version:\s*[0-9]+\.[0-9]+\.[0-9]+\s*$" environments/test/images.yaml; then
              echo "##[section]Unlabeled release version in test -- promoting to stage"
              cp environments/test/images.yaml environments/stage/images.yaml
              git add environments/stage/images.yaml
              git commit -m "Promote Test To Stage [skip ci]"
              git push origin main
            else
              echo "Beta/prerelease version in test -- not promoting to stage"
            fi
          displayName: Promote Test to Stage
