# Gates this chart's ExternalSecret templates. Folder-level separation in
# the GitOps repo (see techradar-data's Chart.yaml comment) only prevents
# the two releases' rendered manifests from overwriting each other in the
# same git commit -- it does NOT prevent two separate GitOps Applications
# from both independently applying an object with the same kind+name+
# namespace to the live cluster, since ownership there is decided by
# whichever Application synced most recently, not by which folder a
# manifest came from. Confirmed directly: after techradar-data's
# renderSecrets flipped on for an environment and synced cleanly, the live
# techradar-data-api-es ExternalSecret was still tracked by (and reverted
# to) THIS chart's release, because this chart kept rendering its own
# identically-named copy unconditionally. Stays false until this
# environment cuts over, then flips true to stop this side from rendering.
cutOver: false

defaultPodOptions:
  imagePullSecrets:
    - name: cr-spydersoft-github

controllers:
  main:
    enabled: false
  postgres:
    # bjw-s only appends a controller's identifier as a resource-name suffix
    # when there's more than one controller of that kind -- with only
    # postgres left in this chart (frontend/data-api moved to the app repo's
    # own OCI chart), that would silently rename this Deployment from
    # techradar-postgres to bare techradar, orphaning the existing resource
    # instead of adopting it. forceRename keeps the name identical to
    # what's already live, without affecting persistence/configMap naming
    # (which was already bare "techradar" even before this split, since
    # those only ever had a single entry).
    forceRename: "{{ .Release.Name }}-postgres"
    containers:
      main:
        image:
          repository: postgres
          pullPolicy: IfNotPresent
          tag: 17
        envFrom:
        - secretRef:
            name: postgres-secrets
        env:
        - value: 5432
          name: POSTGRES_PORT
        - value: postgres-service
          name: POSTGRES_HOST
        - value: techradar
          name: POSTGRES_DB
        strategy:
          type: Recreate
    strategy: Recreate
    type: deployment
    replicas: 1
    enabled: true
    revisionHistoryLimit: 3
service:
  main:
    enabled: false
  postgres:
    type: ClusterIP
    primary: false
    forceRename: "{{ .Release.Name }}-postgres"
    ports:
      postgres:
        enabled: true
        port: 5432
    controller: postgres
configMaps:
  postgres-init-data:
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
            ALTER DATABASE ${POSTGRES_DB} OWNER TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi
    enabled: true
persistence:
  postgres-init-data:
    type: configMap
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-techradar-user.sh
    enabled: true
    identifier: postgres-init-data
  postgres-data:
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    storageClass: nfs-client
    accessMode: ReadWriteMany
    type: persistentVolumeClaim
    size: 300Gi
    enabled: true
  postgres-secrets:
    type: secret
    name: postgres-secrets
    enabled: true

route:
  main:
    enabled: false

env_name: dev
